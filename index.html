<!doctype html>
<html lang="fi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kisapuiston lipputilanne</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>Kisapuiston lipputilanne</h1>
    <p id="updated-at"></p>
    <p class="disclaimer">
      Luvut perustuvat elippu.net-verkkokaupan julkisiin myyntitietoihin eivätkä välttämättä vastaa toteutunutta
      yleisömäärää. Sivu päivittyy tunneittain, ottelupäivinä 10 minuutin välein klo 15–21. Epävirallinen
      seurantasivu.
    </p>
  </header>

  <p id="app-error" hidden></p>

  <main>
    <section id="kausikortit" class="section">
      <div id="kausikortit-cards"></div>
    </section>

    <div id="filter-bar-container"></div>
    <div id="timeline"></div>

    <div id="dashboard-container" hidden></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.5.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
